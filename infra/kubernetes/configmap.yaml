apiVersion: v1
kind: ConfigMap
metadata:
  name: colossus-config
  namespace: colossus
data:
  COLOSSUS_ENV: "production"
  COLOSSUS_LOG_LEVEL: "info"
  COLOSSUS_LOG_FORMAT: "json"
  KAFKA_BROKERS: "kafka-0.kafka:9092,kafka-1.kafka:9092,kafka-2.kafka:9092"
  KAFKA_REPLICATION_FACTOR: "3"
  COCKROACHDB_HOST: "cockroachdb.colossus:26257"
  COCKROACHDB_DATABASE: "colossus"
  REDIS_HOST: "redis.colossus:6379"
  REDIS_CLUSTER: "true"
  OPENSEARCH_HOST: "opensearch.colossus:9200"
  NEO4J_HOST: "neo4j.colossus:7687"
  TEMPORAL_HOST: "temporal.colossus:7233"
  VAULT_ADDR: "http://vault.colossus:8200"
  KEYCLOAK_URL: "http://keycloak.colossus:8080"
  S3_ENDPOINT: "s3.amazonaws.com"
  S3_REGION: "us-east-1"
  S3_BUCKET_ARTIFACTS: "colossus-artifacts"
  CDN_PRIMARY: "https://cdn.colossus.io"
  METRICS_PORT: "9090"
  HEALTH_PORT: "8080"
  GRPC_PORT: "50051"
  MAX_WORKERS_PER_NODE: "10"
  GENERATION_TIMEOUT_SECONDS: "3600"
  DISCOVERY_RATE_LIMIT_PER_DOMAIN: "1"
  DISCOVERY_POLITENESS_DELAY_MS: "1000"
