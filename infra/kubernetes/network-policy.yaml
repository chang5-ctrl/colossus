apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: colossus-default-deny
  namespace: colossus
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: colossus-allow-internal
  namespace: colossus
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: colossus
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 50051
        - protocol: TCP
          port: 9090
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: colossus
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 50051
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 26257
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 9200
        - protocol: TCP
          port: 7687
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 7233
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: colossus-allow-external
  namespace: colossus
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/exposed: "true"
  policyTypes:
    - Ingress
  ingress:
    - from: []
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 443
