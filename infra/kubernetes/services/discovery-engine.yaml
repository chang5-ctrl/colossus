apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-engine
  namespace: colossus
  labels:
    app: discovery-engine
    app.kubernetes.io/part-of: colossus
    app.kubernetes.io/component: control-plane
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: discovery-engine
  template:
    metadata:
      labels:
        app: discovery-engine
        app.kubernetes.io/part-of: colossus
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: colossus-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
        - name: discovery-engine
          image: ghcr.io/chang5-ctrl/colossus/discovery-engine:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 50051
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: COLOSSUS_ENV
              valueFrom:
                configMapKeyRef:
                  name: colossus-config
                  key: COLOSSUS_ENV
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: colossus-config
                  key: KAFKA_BROKERS
            - name: COCKROACHDB_HOST
              valueFrom:
                configMapKeyRef:
                  name: colossus-config
                  key: COCKROACHDB_HOST
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: colossus-config
                  key: REDIS_HOST
            - name: COCKROACHDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: colossus-secrets
                  key: COCKROACHDB_PASSWORD
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - discovery-engine
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: discovery-engine
  namespace: colossus
  labels:
    app: discovery-engine
spec:
  type: ClusterIP
  selector:
    app: discovery-engine
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: grpc
      port: 50051
      targetPort: 50051
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: discovery-engine-hpa
  namespace: colossus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: discovery-engine
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
