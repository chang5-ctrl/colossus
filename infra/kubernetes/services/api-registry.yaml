apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-registry
  namespace: colossus
  labels:
    app: api-registry
    app.kubernetes.io/part-of: colossus
    app.kubernetes.io/component: control-plane
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-registry
  template:
    metadata:
      labels:
        app: api-registry
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: colossus-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: api-registry
          image: ghcr.io/chang5-ctrl/colossus/api-registry:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 50051
            - name: metrics
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: colossus-config
          env:
            - name: COCKROACHDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: colossus-secrets
                  key: COCKROACHDB_PASSWORD
          resources:
            requests:
              memory: "1Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "4000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-registry
  namespace: colossus
spec:
  type: ClusterIP
  selector:
    app: api-registry
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: grpc
      port: 50051
      targetPort: 50051
    - name: metrics
      port: 9090
      targetPort: 9090
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-registry-hpa
  namespace: colossus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-registry
  minReplicas: 3
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
