apiVersion: v1
kind: ServiceAccount
metadata:
  name: colossus-service-account
  namespace: colossus
  labels:
    app.kubernetes.io/part-of: colossus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: colossus-role
  namespace: colossus
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: colossus-role-binding
  namespace: colossus
subjects:
  - kind: ServiceAccount
    name: colossus-service-account
    namespace: colossus
roleRef:
  kind: Role
  name: colossus-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: colossus-cluster-role
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: colossus-cluster-role-binding
subjects:
  - kind: ServiceAccount
    name: colossus-service-account
    namespace: colossus
roleRef:
  kind: ClusterRole
  name: colossus-cluster-role
  apiGroup: rbac.authorization.k8s.io
