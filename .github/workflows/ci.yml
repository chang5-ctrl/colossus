name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BAZEL_VERSION: 7.0.0
  GO_VERSION: 1.22.0
  RUST_VERSION: stable
  PYTHON_VERSION: 3.12

jobs:
  # =============================================================================
  # LINT & FORMAT
  # =============================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazel
        uses: bazelbuild/setup-bazelisk@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python tools
        run: |
          pip install ruff mypy poetry

      - name: Go Format Check
        run: |
          test -z $(gofmt -l services/ libs/ tools/)

      - name: Go Lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=10m

      - name: Rust Format Check
        run: |
          cargo fmt -- --check

      - name: Rust Clippy
        run: |
          cargo clippy --all-targets --all-features -- -D warnings

      - name: Python Ruff
        run: |
          ruff check services/ libs/ tools/
          ruff format --check services/ libs/ tools/

      - name: Python MyPy
        run: |
          mypy --strict services/ libs/ tools/

      - name: Bazel Buildifier
        run: |
          bazel run //:buildifier_check

      - name: Markdown Lint
        uses: DavidAnson/markdownlint-cli2-action@v14
        with:
          globs: '**/*.md'

      - name: YAML Lint
        run: |
          pip install yamllint
          yamllint -c .yamllint.yml infra/ .github/

      - name: Dockerfile Lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "Dockerfile.*"
          recursive: true

  # =============================================================================
  # SECURITY SCAN
  # =============================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD

      - name: Dependency Scan (Go)
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt sarif -out gosec.sarif ./...'

      - name: Dependency Scan (Rust)
        run: |
          cargo install cargo-audit
          cargo audit

      - name: Dependency Scan (Python)
        run: |
          pip install safety
          safety check

      - name: SAST (Semgrep)
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/cwe-top-25

      - name: SAST (CodeQL)
        uses: github/codeql-action/init@v2
        with:
          languages: go, rust, python, javascript

      - name: CodeQL Autobuild
        uses: github/codeql-action/autobuild@v2

      - name: CodeQL Analysis
        uses: github/codeql-action/analyze@v2

      - name: Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # =============================================================================
  # BUILD
  # =============================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service:
          - discovery-engine
          - sdk-generator
          - api-registry
          - validation-engine
          - release-manager
          - package-publisher
          - version-monitor
          - api-change-detection
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazel
        uses: bazelbuild/setup-bazelisk@v2

      - name: Cache Bazel
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/bazel
          key: bazel-${{ runner.os }}-${{ matrix.service }}-${{ hashFiles('**/BUILD', '**/WORKSPACE') }}
          restore-keys: |
            bazel-${{ runner.os }}-${{ matrix.service }}-
            bazel-${{ runner.os }}-

      - name: Build Service
        run: |
          bazel build //services/${{ matrix.service }}:all

      - name: Build Docker Image
        run: |
          bazel run //services/${{ matrix.service }}:image

      - name: Save Docker Image
        run: |
          docker save ghcr.io/chang5-ctrl/colossus/${{ matrix.service }}:latest > ${{ matrix.service }}.tar

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-image
          path: ${{ matrix.service }}.tar
          retention-days: 1

  # =============================================================================
  # TEST
  # =============================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        test-suite:
          - unit
          - integration
        service:
          - discovery-engine
          - sdk-generator
          - api-registry
          - validation-engine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazel
        uses: bazelbuild/setup-bazelisk@v2

      - name: Cache Bazel
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/bazel
          key: bazel-test-${{ runner.os }}-${{ matrix.service }}-${{ hashFiles('**/BUILD') }}
          restore-keys: |
            bazel-test-${{ runner.os }}-

      - name: Run Unit Tests
        if: matrix.test-suite == 'unit'
        run: |
          bazel test //services/${{ matrix.service }}/... --test_output=errors

      - name: Run Integration Tests
        if: matrix.test-suite == 'integration'
        run: |
          bazel test //tests/integration/${{ matrix.service }}/... --test_output=errors

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.service }}-${{ matrix.test-suite }}
          path: bazel-testlogs/

      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        if: matrix.test-suite == 'unit'
        with:
          files: ./coverage.out
          flags: ${{ matrix.service }}
          name: ${{ matrix.service }}-coverage

  # =============================================================================
  # E2E TESTS
  # =============================================================================
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Kind
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: colossus-e2e
          config: infra/kind-config.yaml

      - name: Load Images
        run: |
          for service in discovery-engine sdk-generator api-registry; do
            docker load < ${{ service }}.tar
            kind load docker-image ghcr.io/chang5-ctrl/colossus/${service}:latest --name colossus-e2e
          done

      - name: Deploy to Kind
        run: |
          kubectl apply -k infra/kustomize/overlays/e2e
          kubectl wait --for=condition=available --timeout=300s deployment/discovery-engine -n colossus
          kubectl wait --for=condition=available --timeout=300s deployment/sdk-generator -n colossus

      - name: Run E2E Tests
        run: |
          bazel test //tests/e2e/... --test_output=errors

      - name: Collect Logs
        if: failure()
        run: |
          kubectl logs -n colossus -l app=discovery-engine --tail=1000 > discovery-engine.log
          kubectl logs -n colossus -l app=sdk-generator --tail=1000 > sdk-generator.log

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-logs
          path: '*.log'

  # =============================================================================
  # PERFORMANCE TESTS
  # =============================================================================
  performance:
    name: Performance Tests
    runs-on: ubuntu-latest-16-cores
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazel
        uses: bazelbuild/setup-bazelisk@v2

      - name: Run Performance Tests
        run: |
          bazel test //tests/performance/... --test_output=errors

      - name: Upload Performance Results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: bazel-testlogs/

  # =============================================================================
  # CHAOS TESTS
  # =============================================================================
  chaos:
    name: Chaos Engineering
    runs-on: ubuntu-latest
    needs: e2e
    if: github.ref == 'refs/heads/main' && github.event.schedule == '0 2 * * 0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Kind
        uses: helm/kind-action@v1.8.0

      - name: Deploy Chaos Mesh
        run: |
          helm repo add chaos-mesh https://charts.chaos-mesh.org
          helm install chaos-mesh chaos-mesh/chaos-mesh -n chaos-mesh --create-namespace

      - name: Run Chaos Tests
        run: |
          bazel test //tests/chaos/... --test_output=errors

      - name: Collect Chaos Results
        uses: actions/upload-artifact@v4
        with:
          name: chaos-results
          path: bazel-testlogs/

  # =============================================================================
  # DETERMINISM CHECK
  # =============================================================================
  determinism:
    name: Determinism Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazel
        uses: bazelbuild/setup-bazelisk@v2

      - name: Generate Twice
        run: |
          bazel run //tools/cli:colossus -- generate --api test-api --version 1.0.0 --output /tmp/gen1
          bazel run //tools/cli:colossus -- generate --api test-api --version 1.0.0 --output /tmp/gen2

      - name: Compare Hashes
        run: |
          HASH1=$(find /tmp/gen1 -type f -exec sha256sum {} + | sort | sha256sum | awk '{print $1}')
          HASH2=$(find /tmp/gen2 -type f -exec sha256sum {} + | sort | sha256sum | awk '{print $1}')
          if [ "$HASH1" != "$HASH2" ]; then
            echo "ERROR: Generation is not deterministic!"
            echo "Hash 1: $HASH1"
            echo "Hash 2: $HASH2"
            exit 1
          fi
          echo "Generation is deterministic: $HASH1"
